<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Chess Game Review</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
  <style>
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
      background: #f5f5f5;
      color: #333;
    }
    h1 {
      text-align: center;
      color: #2c3e50;
      margin-bottom: 10px;
    }
    .upload-section {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      margin-bottom: 20px;
    }
    textarea {
      width: 100%;
      height: 130px;
      font-family: monospace;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 10px;
      resize: vertical;
    }
    input[type="file"] {
      margin: 10px 0;
    }
    button {
      background: #2c3e50;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover {
      background: #1e2b38;
    }
    button:disabled {
      background: #aaa;
      cursor: not-allowed;
    }
    .analysis-section {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    .board-container {
      display: flex;
      flex-wrap: wrap;
      gap: 30px;
      align-items: flex-start;
    }
    #board {
      width: 400px;
      max-width: 100%;
    }
    .stats {
      flex: 1;
      min-width: 220px;
    }
    .stat-box {
      background: #f8f9fa;
      border-radius: 10px;
      padding: 15px;
      margin-bottom: 15px;
    }
    .accuracy-number {
      font-size: 2.5rem;
      font-weight: bold;
      color: #2c3e50;
    }
    .move-list {
      margin-top: 25px;
      max-height: 450px;
      overflow-y: auto;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th {
      background: #f0f0f0;
      padding: 8px;
      font-size: 0.9rem;
      text-align: left;
      position: sticky;
      top: 0;
    }
    td {
      padding: 6px 8px;
      border-bottom: 1px solid #eee;
      font-size: 0.9rem;
    }
    .move-row {
      cursor: pointer;
    }
    .move-row:hover {
      background: #f0f8ff;
    }
    .move-row.active {
      background: #d4e7ff;
      font-weight: bold;
    }
    .best { color: #27ae60; }
    .excellent { color: #2ecc71; }
    .good { color: #3498db; }
    .inaccuracy { color: #f39c12; }
    .mistake { color: #e67e22; }
    .blunder { color: #e74c3c; font-weight: bold; }
    .cp-loss {
      font-size: 0.8rem;
      color: #666;
      margin-left: 6px;
    }
    .loading {
      display: inline-block;
      margin-left: 10px;
      color: #888;
    }
    .highlight-square {
      box-shadow: inset 0 0 0 3px rgba(255, 215, 0, 0.8);
    }
    .error-message {
      color: #e74c3c;
      padding: 10px;
      background: #fdf0f0;
      border-radius: 5px;
      margin: 10px 0;
    }
    @media (max-width: 600px) {
      .board-container {
        flex-direction: column;
        align-items: center;
      }
      #board {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <h1>♟️ Chess Game Review</h1> 
  <p style="text-align:center; color:#555;">Upload a PGN or paste it below, then analyze your game with Stockfish.</p>

  <div class="upload-section">
    <input type="file" id="pgnFile" accept=".pgn,.txt">
    <textarea id="pgnInput" placeholder="Paste your PGN here..."></textarea>
    <button id="analyzeBtn">🔍 Analyze Game</button>
    <span id="progress" class="loading"></span>
    <div id="errorDisplay" class="error-message" style="display:none;"></div>
  </div>

  <div class="analysis-section" id="analysisSection" style="display: none;">
    <div class="board-container">
      <div id="board"></div>
      <div class="stats">
        <div class="stat-box">
          <div style="font-size:1rem;">Accuracy</div>
          <div class="accuracy-number" id="accuracyDisplay">--</div>
          <div style="font-size:0.9rem; color:#666;">Avg. centipawn loss: <span id="avgCpLoss">--</span></div>
        </div>
        <div id="moveStats" style="font-size:0.9rem;"></div>
      </div>
    </div>
    <h3>Move List (click to jump)</h3>
    <div class="move-list" id="moveListContainer">
      <table id="moveTable">
        <thead><tr><th>#</th><th>White</th><th>Black</th></tr></thead>
        <tbody id="moveTableBody"></tbody>
      </table>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <!-- Use chess.js from jsdelivr which is more reliable -->
  <script src="https://cdn.jsdelivr.net/npm/chess.js@0.10.3/dist/chess.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>

  <script>
    (function() {
      // ---------- PGN Parser ----------
      function parsePGN(pgnText) {
        // Normalize quotes and line endings
        let cleaned = pgnText
          .replace(/[\u2018\u2019\u201C\u201D]/g, '"') // Smart quotes to straight quotes
          .replace(/[\u2013\u2014]/g, '-') // Em/en dashes
          .replace(/\r\n/g, '\n')
          .replace(/\r/g, '\n')
          .trim();
        
        // Extract just the moves (skip headers)
        let movesText = cleaned;
        
        // If there are headers, extract moves after the headers
        if (cleaned.includes('[') && cleaned.includes(']')) {
          const parts = cleaned.split('\n');
          let moveLines = [];
          let headersDone = false;
          
          for (let line of parts) {
            if (!headersDone && (line.trim().startsWith('[') || line.trim() === '')) {
              continue;
            }
            headersDone = true;
            if (line.trim()) {
              moveLines.push(line.trim());
            }
          }
          movesText = moveLines.join(' ');
        }
        
        // Clean up the moves text
        movesText = movesText
          .replace(/\{[\s\S]*?\}/g, '')  // Remove comments
          .replace(/\([\s\S]*?\)/g, '')  // Remove variations
          .replace(/\$\d+/g, '')         // Remove NAGs
          .replace(/\d+\.\.\./g, '')     // Remove black move indicators
          .replace(/\s+/g, ' ')          // Normalize spaces
          .trim();
        
        console.log('Cleaned moves:', movesText);
        
        // Parse move by move
        const chess = new Chess();
        const tokens = movesText.split(/\s+/);
        
        for (let token of tokens) {
          // Skip move numbers and result
          if (/^\d+\.$/.test(token) || /^(1-0|0-1|1\/2-1\/2|\*)$/.test(token)) {
            continue;
          }
          
          try {
            chess.move(token, { sloppy: true });
          } catch (e) {
            console.warn('Failed to parse move:', token, e.message);
            // Continue trying other moves
          }
        }
        
        return chess;
      }

      // ---------- Engine wrapper ----------
      class Engine {
        constructor(workerUrl) {
          this.worker = new Worker(workerUrl);
          this.worker.onmessage = this._handleMessage.bind(this);
          this._pendingResolve = null;
          this._pendingType = null;
          this._score = null;
          this._bestmove = null;
          this._ready = false;
        }

        _handleMessage(e) {
          const msg = e.data;
          if (typeof msg !== 'string') return;

          if (msg.startsWith('info') && msg.includes('score')) {
            const scoreMatch = msg.match(/score (cp (-?\d+)|mate (-?\d+))/);
            if (scoreMatch) {
              if (scoreMatch[2] !== undefined) {
                this._score = { cp: parseInt(scoreMatch[2], 10) };
              } else if (scoreMatch[3] !== undefined) {
                this._score = { mate: parseInt(scoreMatch[3], 10) };
              }
            }
          }

          if (msg.startsWith('bestmove')) {
            const parts = msg.split(' ');
            this._bestmove = parts[1];
            if (this._pendingType === 'bestmove' && this._pendingResolve) {
              const resolve = this._pendingResolve;
              this._pendingResolve = null;
              this._pendingType = null;
              resolve({ bestmove: this._bestmove, score: this._score });
            }
            return;
          }

          if (msg.includes('uciok') && this._pendingType === 'uciok') {
            const resolve = this._pendingResolve;
            this._pendingResolve = null;
            this._pendingType = null;
            resolve();
            return;
          }
          if (msg.includes('readyok') && this._pendingType === 'readyok') {
            const resolve = this._pendingResolve;
            this._pendingResolve = null;
            this._pendingType = null;
            resolve();
            return;
          }
        }

        async _waitFor(type) {
          return new Promise((resolve) => {
            this._pendingResolve = resolve;
            this._pendingType = type;
          });
        }

        async init() {
          this.worker.postMessage('uci');
          await this._waitFor('uciok');
          this.worker.postMessage('isready');
          await this._waitFor('readyok');
          this.worker.postMessage('setoption name MultiPV value 1');
          this._ready = true;
        }

        async analyze(fen, depth = 12) {
          if (!this._ready) throw new Error('Engine not initialized');
          this._score = null;
          this._bestmove = null;
          this.worker.postMessage(`position fen ${fen}`);
          this.worker.postMessage(`go depth ${depth}`);
          const result = await this._waitFor('bestmove');
          return result;
        }

        terminate() {
          this.worker.terminate();
        }
      }

      // ---------- Helpers ----------
      function scoreToCentipawns(score) {
        if (!score) return 0;
        if (score.cp !== undefined) return score.cp;
        if (score.mate !== undefined) {
          const mateIn = score.mate;
          if (mateIn > 0) return 10000 - mateIn * 100;
          else return -10000 - mateIn * 100;
        }
        return 0;
      }

      function classifyMove(cpLoss) {
        if (cpLoss <= 5) return 'best';
        if (cpLoss <= 10) return 'excellent';
        if (cpLoss <= 25) return 'good';
        if (cpLoss <= 50) return 'inaccuracy';
        if (cpLoss <= 100) return 'mistake';
        return 'blunder';
      }

      // ---------- Global state ----------
      let board = null;
      let engine = null;
      let currentGameMoves = [];
      let analysisResults = [];
      let currentMoveIndex = -1;

      function highlightMoveSquares(from, to) {
        $('.square-55d63').removeClass('highlight-square');
        if (from) $(`.square-${from}`).addClass('highlight-square');
        if (to) $(`.square-${to}`).addClass('highlight-square');
      }

      function updateBoardToMove(index) {
        if (!board || index < 0 || index >= analysisResults.length) return;
        const result = analysisResults[index];
        board.position(result.fenAfter, false);
        const move = currentGameMoves[index].move;
        highlightMoveSquares(move.from, move.to);
        $('#moveTableBody tr').removeClass('active');
        $(`#moveRow-${index}`).addClass('active');
        currentMoveIndex = index;
      }

      function renderMoveList() {
        const tbody = $('#moveTableBody');
        tbody.empty();
        const categorized = analysisResults;
        let rowHtml = '';
        for (let i = 0; i < categorized.length; i += 2) {
          const moveNum = Math.floor(i / 2) + 1;
          const whiteMove = categorized[i];
          const blackMove = categorized[i + 1];
          rowHtml += `<tr>`;
          rowHtml += `<td>${moveNum}</td>`;
          if (whiteMove) {
            rowHtml += `<td class="move-row ${whiteMove.category}" id="moveRow-${i}" data-index="${i}">
              ${whiteMove.move.san}
              <span class="cp-loss">${whiteMove.cpLoss.toFixed(0)}</span>
              <span class="${whiteMove.category}">${whiteMove.category.toUpperCase()}</span>
            </td>`;
          } else {
            rowHtml += `<td></td>`;
          }
          if (blackMove) {
            rowHtml += `<td class="move-row ${blackMove.category}" id="moveRow-${i+1}" data-index="${i+1}">
              ${blackMove.move.san}
              <span class="cp-loss">${blackMove.cpLoss.toFixed(0)}</span>
              <span class="${blackMove.category}">${blackMove.category.toUpperCase()}</span>
            </td>`;
          } else {
            rowHtml += `<td></td>`;
          }
          rowHtml += `</tr>`;
        }
        tbody.html(rowHtml);

        $('.move-row').on('click', function() {
          const idx = parseInt($(this).data('index'), 10);
          updateBoardToMove(idx);
        });
      }

      function updateStats() {
        const totalMoves = analysisResults.length;
        if (totalMoves === 0) return;
        const totalCpLoss = analysisResults.reduce((sum, r) => sum + r.cpLoss, 0);
        const avgCpLoss = totalCpLoss / totalMoves;
        const accuracy = Math.max(0, Math.min(100, 100 - avgCpLoss)).toFixed(1);
        $('#accuracyDisplay').text(`${accuracy}%`);
        $('#avgCpLoss').text(avgCpLoss.toFixed(2));
        const counts = { best:0, excellent:0, good:0, inaccuracy:0, mistake:0, blunder:0 };
        analysisResults.forEach(r => counts[r.category]++);
        $('#moveStats').html(`
          <div>✅ Best: ${counts.best} | ⭐ Excellent: ${counts.excellent} | 👍 Good: ${counts.good}</div>
          <div>⚠️ Inaccuracy: ${counts.inaccuracy} | ❗ Mistake: ${counts.mistake} | 💥 Blunder: ${counts.blunder}</div>
        `);
      }

      async function runAnalysis(pgnText) {
        $('#errorDisplay').hide();
        
        // Parse PGN
        const chess = parsePGN(pgnText);
        const history = chess.history({ verbose: true });
        
        if (history.length === 0) {
          $('#errorDisplay').show().text('❌ Could not parse any moves. Please check your PGN format. Make sure it contains valid chess moves in standard algebraic notation.');
          return;
        }
        
        console.log('Successfully parsed', history.length, 'moves');
        
        currentGameMoves = [];
        const replay = new Chess();
        for (let move of history) {
          const fenBefore = replay.fen();
          replay.move(move.san);
          const fenAfter = replay.fen();
          currentGameMoves.push({
            fenBefore,
            fenAfter,
            move,
            color: move.color
          });
        }

        if (!engine) {
          try {
            engine = new Engine('https://raw.githubusercontent.com/nmrugg/stockfish.js/master/stockfish.js');
            await engine.init();
            console.log('Engine initialized');
          } catch (e) {
            $('#errorDisplay').show().text('Failed to load Stockfish engine. Please check your internet connection.');
            console.error(e);
            return;
          }
        }

        const totalMoves = currentGameMoves.length;
        analysisResults = [];
        $('#progress').text(`Analyzing... 0/${totalMoves}`);
        
        for (let i = 0; i < totalMoves; i++) {
          const step = currentGameMoves[i];
          const isWhite = step.color === 'w';

          const beforeAnalysis = await engine.analyze(step.fenBefore, 12);
          const bestScore = beforeAnalysis.score;
          const bestMoveUCI = beforeAnalysis.bestmove;

          const afterAnalysis = await engine.analyze(step.fenAfter, 12);
          const actualScore = afterAnalysis.score;

          const bestCp = scoreToCentipawns(bestScore);
          const actualCp = scoreToCentipawns(actualScore);

          let cpLoss;
          if (isWhite) {
            cpLoss = bestCp - actualCp;
          } else {
            cpLoss = actualCp - bestCp;
          }
          cpLoss = Math.max(0, cpLoss);
          const category = classifyMove(cpLoss);
          
          analysisResults.push({
            cpLoss,
            category,
            fenAfter: step.fenAfter,
            move: step.move,
            bestMove: bestMoveUCI,
            bestScoreCp: bestCp,
            actualScoreCp: actualCp
          });

          $('#progress').text(`Analyzing... ${i+1}/${totalMoves}`);
        }

        $('#analysisSection').show();
        $('#progress').text('');

        if (!board) {
          board = Chessboard('board', {
            position: 'start',
            draggable: false,
            showNotation: true,
            pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
          });
        }

        if (analysisResults.length > 0) {
          board.position(currentGameMoves[0].fenBefore, false);
          highlightMoveSquares(null, null);
          currentMoveIndex = -1;
        }

        renderMoveList();
        updateStats();

        if (analysisResults.length > 0) {
          updateBoardToMove(0);
        }
      }

      $('#analyzeBtn').on('click', async function() {
        const pgnText = $('#pgnInput').val().trim();
        if (!pgnText) {
          alert('Please paste a PGN or upload a file.');
          return;
        }
        $(this).prop('disabled', true);
        $('#errorDisplay').hide();
        try {
          await runAnalysis(pgnText);
        } catch (e) {
          $('#errorDisplay').show().text('An error occurred: ' + e.message);
          console.error(e);
        } finally {
          $(this).prop('disabled', false);
        }
      });

      $('#pgnFile').on('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(ev) {
          $('#pgnInput').val(ev.target.result);
        };
        reader.readAsText(file);
      });

      window.addEventListener('beforeunload', () => {
        if (engine) engine.terminate();
      });
    })();
  </script>
</body>
</html>
