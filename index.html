<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Chess Game Review</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
  <style>
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
      background: #f5f5f5;
      color: #333;
    }
    h1 {
      text-align: center;
      color: #2c3e50;
      margin-bottom: 10px;
    }
    .upload-section {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      margin-bottom: 20px;
    }
    textarea {
      width: 100%;
      height: 130px;
      font-family: monospace;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 10px;
      resize: vertical;
      box-sizing: border-box;
    }
    input[type="file"] {
      margin: 10px 0;
    }
    button {
      background: #2c3e50;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover {
      background: #1e2b38;
    }
    button:disabled {
      background: #aaa;
      cursor: not-allowed;
    }
    .analysis-section {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    .board-container {
      display: flex;
      flex-wrap: wrap;
      gap: 30px;
      align-items: flex-start;
    }
    #board {
      width: 400px;
      max-width: 100%;
    }
    .stats {
      flex: 1;
      min-width: 220px;
    }
    .stat-box {
      background: #f8f9fa;
      border-radius: 10px;
      padding: 15px;
      margin-bottom: 15px;
    }
    .accuracy-number {
      font-size: 2.5rem;
      font-weight: bold;
      color: #2c3e50;
    }
    .move-list {
      margin-top: 25px;
      max-height: 450px;
      overflow-y: auto;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th {
      background: #f0f0f0;
      padding: 8px;
      font-size: 0.9rem;
      text-align: left;
      position: sticky;
      top: 0;
    }
    td {
      padding: 6px 8px;
      border-bottom: 1px solid #eee;
      font-size: 0.9rem;
    }
    .move-row {
      cursor: pointer;
    }
    .move-row:hover {
      background: #f0f8ff;
    }
    .move-row.active {
      background: #d4e7ff;
      font-weight: bold;
    }
    .best { color: #27ae60; }
    .excellent { color: #2ecc71; }
    .good { color: #3498db; }
    .inaccuracy { color: #f39c12; }
    .mistake { color: #e67e22; }
    .blunder { color: #e74c3c; font-weight: bold; }
    .cp-loss {
      font-size: 0.8rem;
      color: #666;
      margin-left: 6px;
    }
    .loading {
      display: inline-block;
      margin-left: 10px;
      color: #888;
      font-weight: bold;
    }
    .highlight-square {
      box-shadow: inset 0 0 0 3px rgba(255, 215, 0, 0.8);
    }
    .error-message {
      color: #e74c3c;
      padding: 10px;
      background: #fdf0f0;
      border-radius: 5px;
      margin: 10px 0;
    }
    @media (max-width: 600px) {
      .board-container {
        flex-direction: column;
        align-items: center;
      }
      #board {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <h1>♟️ Chess Game Review</h1> 
  <p style="text-align:center; color:#555;">Upload a PGN or paste it below, then analyze your game with Stockfish.</p>

  <div class="upload-section">
    <input type="file" id="pgnFile" accept=".pgn,.txt">
    <textarea id="pgnInput" placeholder="Paste your PGN here..."></textarea>
    <button id="analyzeBtn">🔍 Analyze Game</button>
    <span id="progress" class="loading"></span>
    <div id="errorDisplay" class="error-message" style="display:none;"></div>
  </div>

  <div class="analysis-section" id="analysisSection" style="display: none;">
    <div class="board-container">
      <div id="board"></div>
      <div class="stats">
        <div class="stat-box">
          <div style="font-size:1rem;">Accuracy</div>
          <div class="accuracy-number" id="accuracyDisplay">--</div>
          <div style="font-size:0.9rem; color:#666;">Avg. centipawn loss: <span id="avgCpLoss">--</span></div>
        </div>
        <div id="moveStats" style="font-size:0.9rem;"></div>
      </div>
    </div>
    <h3>Move List (click to jump)</h3>
    <div class="move-list" id="moveListContainer">
      <table id="moveTable">
        <thead><tr><th>#</th><th>White</th><th>Black</th></tr></thead>
        <tbody id="moveTableBody"></tbody>
      </table>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.12.0/chess.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>

  <script>
    (function() {
      // ---------- PGN Parser ----------
      function cleanPGN(pgn) {
        let cleaned = pgn
          .replace(/[\u2018\u2019]/g, "'")
          .replace(/[\u201C\u201D]/g, '"')
          .replace(/[\u2013\u2014]/g, '-')
          .replace(/\r\n/g, '\n')
          .replace(/\r/g, '\n')
          .trim();
        
        const lines = cleaned.split('\n');
        let headerEnd = -1;
        for (let i = 0; i < lines.length; i++) {
          if (lines[i].startsWith('[')) {
            headerEnd = i;
          } else if (lines[i].trim() !== '') {
            if (headerEnd >= 0 && lines[headerEnd + 1]?.trim() !== '') {
              lines.splice(headerEnd + 1, 0, '');
            }
            break;
          }
        }
        return lines.join('\n');
      }

      function extractMovesOnly(pgn) {
        const lines = pgn.split('\n');
        let movesPart = [];
        let inHeaders = true;
        
        for (let line of lines) {
          if (inHeaders && line.trim().startsWith('[')) continue;
          if (inHeaders && line.trim() === '') {
            inHeaders = false;
            continue;
          }
          if (!inHeaders) movesPart.push(line.trim());
        }
        
        let moves = movesPart.join(' ')
          .replace(/\{[\s\S]*?\}/g, '')
          .replace(/\([\s\S]*?\)/g, '')
          .replace(/\$\d+/g, '')
          .replace(/1-0|0-1|1\/2-1\/2|\*/g, '')
          .replace(/\s+/g, ' ')
          .trim();
        return moves;
      }

      function parsePGNFlexible(pgn) {
        const chess = new Chess();
        
        try {
          const cleaned = cleanPGN(pgn);
          chess.load_pgn(cleaned, { sloppy: true, newline_char: '\n' });
          if (chess.history().length > 0) return chess;
        } catch (e) {}

        try {
          const chess2 = new Chess();
          const movesOnly = extractMovesOnly(pgn);
          chess2.load_pgn(movesOnly, { sloppy: true });
          if (chess2.history().length > 0) return chess2;
        } catch (e) {}

        try {
          const chess3 = new Chess();
          const movesOnly = extractMovesOnly(pgn);
          const moves = movesOnly.match(/\d+\.\s*\S+(\s+\S+)?/g);
          if (moves) {
            for (let moveText of moves) {
              const parts = moveText.replace(/^\d+\.\s*/, '').split(/\s+/);
              for (let part of parts) {
                if (part && !part.match(/^[0-9.]+$/)) {
                  try { chess3.move(part, { sloppy: true }); } catch (e) {}
                }
              }
            }
            if (chess3.history().length > 0) return chess3;
          }
        } catch (e) {}

        try {
          const chess4 = new Chess();
          const movesOnly = extractMovesOnly(pgn);
          const movePattern = /([KQRBN]?[a-h]?[1-8]?x?[a-h][1-8](?:=[QRBN])?[\+#]?|O-O(?:-O)?)/g;
          const moves = movesOnly.match(movePattern);
          if (moves) {
            for (let move of moves) {
              try { chess4.move(move, { sloppy: true }); } catch (e) {}
            }
            if (chess4.history().length > 0) return chess4;
          }
        } catch (e) {}

        return null;
      }

      // ---------- Engine wrapper ----------
      class Engine {
        constructor() {
          this.worker = null;
          this._pendingResolve = null;
          this._pendingType = null;
          this._score = null;
          this._bestmove = null;
          this._ready = false;
        }

        _handleMessage(e) {
          const msg = e.data;
          if (typeof msg !== 'string') return;

          if (msg.startsWith('info') && msg.includes('score')) {
            const scoreMatch = msg.match(/score (cp (-?\d+)|mate (-?\d+))/);
            if (scoreMatch) {
              if (scoreMatch[2] !== undefined) {
                this._score = { cp: parseInt(scoreMatch[2], 10) };
              } else if (scoreMatch[3] !== undefined) {
                this._score = { mate: parseInt(scoreMatch[3], 10) };
              }
            }
          }

          if (msg.startsWith('bestmove')) {
            const parts = msg.split(' ');
            this._bestmove = parts[1];
            if (this._pendingType === 'bestmove' && this._pendingResolve) {
              const resolve = this._pendingResolve;
              this._pendingResolve = null;
              this._pendingType = null;
              resolve({ bestmove: this._bestmove, score: this._score });
            }
            return;
          }

          if (msg.includes('uciok') && this._pendingType === 'uciok') {
            const resolve = this._pendingResolve;
            this._pendingResolve = null;
            this._pendingType = null;
            resolve();
            return;
          }
          if (msg.includes('readyok') && this._pendingType === 'readyok') {
            const resolve = this._pendingResolve;
            this._pendingResolve = null;
            this._pendingType = null;
            resolve();
            return;
          }
        }

        async _waitFor(type) {
          return new Promise((resolve) => {
            this._pendingResolve = resolve;
            this._pendingType = type;
          });
        }

        async init(workerUrl) {
          // Fix for cross-origin workers: Create a Blob URL
          const response = await fetch(workerUrl);
          const script = await response.text();
          const blob = new Blob([script], { type: 'application/javascript' });
          const objectUrl = URL.createObjectURL(blob);

          this.worker = new Worker(objectUrl);
          this.worker.onmessage = this._handleMessage.bind(this);

          this.worker.postMessage('uci');
          await this._waitFor('uciok');
          this.worker.postMessage('isready');
          await this._waitFor('readyok');
          this.worker.postMessage('setoption name MultiPV value 1');
          this._ready = true;
        }

        async analyze(fen, depth = 12) {
          if (!this._ready) throw new Error('Engine not initialized');
          this._score = null;
          this._bestmove = null;
          this.worker.postMessage(`position fen ${fen}`);
          this.worker.postMessage(`go depth ${depth}`);
          const result = await this._waitFor('bestmove');
          return result;
        }

        terminate() {
          if (this.worker) {
            this.worker.terminate();
          }
        }
      }

      // ---------- Helpers ----------
      function scoreToCentipawns(score) {
        if (!score) return 0;
        if (score.cp !== undefined) return score.cp;
        if (score.mate !== undefined) {
          const mateIn = score.mate;
          if (mateIn > 0) return 10000 - mateIn * 100;
          else return -10000 - mateIn * 100;
        }
        return 0;
      }

      function classifyMove(cpLoss) {
        if (cpLoss <= 5) return 'best';
        if (cpLoss <= 10) return 'excellent';
        if (cpLoss <= 25) return 'good';
        if (cpLoss <= 50) return 'inaccuracy';
        if (cpLoss <= 100) return 'mistake';
        return 'blunder';
      }

      // ---------- Global state ----------
      let board = null;
      let engine = null;
      let currentGameMoves = [];
      let analysisResults = [];
      let currentMoveIndex = -1;

      function highlightMoveSquares(from, to) {
        $('.square-55d63').removeClass('highlight-square');
        if (from) $(`.square-${from}`).addClass('highlight-square');
        if (to) $(`.square-${to}`).addClass('highlight-square');
      }

      function updateBoardToMove(index) {
        if (!board || index < 0 || index >= analysisResults.length) return;
        const result = analysisResults[index];
        board.position(result.fenAfter, false);
        const move = currentGameMoves[index].move;
        highlightMoveSquares(move.from, move.to);
        $('#moveTableBody tr').removeClass('active');
        $(`#moveRow-${index}`).addClass('active');
        currentMoveIndex = index;
      }

      function renderMoveList() {
        const tbody = $('#moveTableBody');
        tbody.empty();
        const categorized = analysisResults;
        let rowHtml = '';
        for (let i = 0; i < categorized.length; i += 2) {
          const moveNum = Math.floor(i / 2) + 1;
          const whiteMove = categorized[i];
          const blackMove = categorized[i + 1];
          rowHtml += `<tr>`;
          rowHtml += `<td>${moveNum}</td>`;
          if (whiteMove) {
            rowHtml += `<td class="move-row ${whiteMove.category}" id="moveRow-${i}" data-index="${i}">
              ${whiteMove.move.san}
              <span class="cp-loss">${whiteMove.cpLoss.toFixed(0)}</span>
              <span class="${whiteMove.category}">${whiteMove.category.toUpperCase()}</span>
            </td>`;
          } else {
            rowHtml += `<td></td>`;
          }
          if (blackMove) {
            rowHtml += `<td class="move-row ${blackMove.category}" id="moveRow-${i+1}" data-index="${i+1}">
              ${blackMove.move.san}
              <span class="cp-loss">${blackMove.cpLoss.toFixed(0)}</span>
              <span class="${blackMove.category}">${blackMove.category.toUpperCase()}</span>
            </td>`;
          } else {
            rowHtml += `<td></td>`;
          }
          rowHtml += `</tr>`;
        }
        tbody.html(rowHtml);

        $('.move-row').on('click', function() {
          const idx = parseInt($(this).data('index'), 10);
          updateBoardToMove(idx);
        });
      }

      function updateStats() {
        const totalMoves = analysisResults.length;
        if (totalMoves === 0) return;
        const totalCpLoss = analysisResults.reduce((sum, r) => sum + r.cpLoss, 0);
        const avgCpLoss = totalCpLoss / totalMoves;
        const accuracy = Math.max(0, Math.min(100, 100 - avgCpLoss)).toFixed(1);
        $('#accuracyDisplay').text(`${accuracy}%`);
        $('#avgCpLoss').text(avgCpLoss.toFixed(2));
        const counts = { best:0, excellent:0, good:0, inaccuracy:0, mistake:0, blunder:0 };
        analysisResults.forEach(r => counts[r.category]++);
        $('#moveStats').html(`
          <div>✅ Best: ${counts.best} | ⭐ Excellent: ${counts.excellent} | 👍 Good: ${counts.good}</div>
          <div>⚠️ Inaccuracy: ${counts.inaccuracy} | ❗ Mistake: ${counts.mistake} | 💥 Blunder: ${counts.blunder}</div>
        `);
      }

      async function runAnalysis(pgn) {
        $('#errorDisplay').hide();
        
        const chess = parsePGNFlexible(pgn);
        
        if (!chess || chess.history().length === 0) {
          $('#errorDisplay').show().text('❌ Could not parse PGN. Please check the format. Your PGN should contain moves in standard algebraic notation (e.g., "1. e4 e5 2. Nf3").');
          return;
        }

        const history = chess.history({ verbose: true });
        
        currentGameMoves = [];
        const replay = new Chess();
        for (let move of history) {
          const fenBefore = replay.fen();
          replay.move(move.san);
          const fenAfter = replay.fen();
          currentGameMoves.push({
            fenBefore,
            fenAfter,
            move,
            color: move.color
          });
        }

        if (!engine) {
          try {
            engine = new Engine();
            $('#progress').text('Downloading engine...');
            // Load from CDN to ensure stable fetching
            await engine.init('https://raw.githubusercontent.com/nmrugg/stockfish.js/master/stockfish.js');
          } catch (e) {
            $('#errorDisplay').show().text('Failed to load Stockfish engine. Check your connection or CORS settings.');
            console.error(e);
            return;
          }
        }

        const totalMoves = currentGameMoves.length;
        analysisResults = [];
        
        // Depth reduced to 12. Browser limits make 15 drastically too slow for loops.
        const searchDepth = 12; 
        
        for (let i = 0; i < totalMoves; i++) {
          $('#progress').text(`Analyzing move ${i+1} of ${totalMoves}...`);
          
          const step = currentGameMoves[i];

          const beforeAnalysis = await engine.analyze(step.fenBefore, searchDepth);
          const bestScore = beforeAnalysis.score;
          const bestMoveUCI = beforeAnalysis.bestmove;

          const afterAnalysis = await engine.analyze(step.fenAfter, searchDepth);
          const actualScore = afterAnalysis.score;

          const bestCp = scoreToCentipawns(bestScore);
          const actualCp = scoreToCentipawns(actualScore);

          // Stockfish scores from the perspective of the player to move.
          // bestCp = Score for the player currently moving.
          // actualCp = Score for the opponent AFTER the move is played.
          // The new evaluation from the original player's perspective is -actualCp.
          // CP Loss = Expected Eval - Actual Eval = bestCp - (-actualCp) = bestCp + actualCp
          let cpLoss = bestCp + actualCp;
          cpLoss = Math.max(0, cpLoss); 
          
          const category = classifyMove(cpLoss);
          
          analysisResults.push({
            cpLoss,
            category,
            fenAfter: step.fenAfter,
            move: step.move,
            bestMove: bestMoveUCI,
            bestScoreCp: bestCp,
            actualScoreCp: actualCp
          });
        }

        $('#analysisSection').show();
        $('#progress').text('');

        if (!board) {
          board = Chessboard('board', {
            position: 'start',
            draggable: false,
            showNotation: true,
            pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
          });
        }

        if (analysisResults.length > 0) {
          board.position(currentGameMoves[0].fenBefore, false);
          highlightMoveSquares(null, null);
          currentMoveIndex = -1;
        }

        renderMoveList();
        updateStats();

        if (analysisResults.length > 0) {
          updateBoardToMove(0);
        }
      }

      $('#analyzeBtn').on('click', async function() {
        const pgnText = $('#pgnInput').val().trim();
        if (!pgnText) {
          alert('Please paste a PGN or upload a file.');
          return;
        }
        $(this).prop('disabled', true);
        $('#errorDisplay').hide();
        try {
          await runAnalysis(pgnText);
        } catch (e) {
          $('#errorDisplay').show().text('An error occurred: ' + e.message);
          console.error(e);
        } finally {
          $(this).prop('disabled', false);
        }
      });

      $('#pgnFile').on('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(ev) {
          $('#pgnInput').val(ev.target.result);
        };
        reader.readAsText(file);
      });

      window.addEventListener('beforeunload', () => {
        if (engine) engine.terminate();
      });
    })();
  </script>
</body>
</html>
